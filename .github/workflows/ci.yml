name: CI

# Two per-OS jobs, each: build + headless tests + live DevFlow integration.
# Between them both renderers get headless and live coverage:
#   • Windows job → headless Skia (net10.0-desktop) + WinUI 3 build + live WinUI DevFlow
#   • macOS job   → Skia build + headless + live Skia DevFlow
# WinUI XAML libraries must build with VS MSBuild, not `dotnet build` (UNOB0008 —
# see docs/winui.md). DevFlow is renderer-agnostic, so the same net10.0-desktop
# integration tests drive the live app on every platform; only the launch differs.
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  windows:
    name: Windows (Skia headless + WinUI build + live DevFlow)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0   # GitVersion needs full history (no shallow clone)
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Add VS MSBuild to PATH
        uses: microsoft/setup-msbuild@v2
      - name: Restore Uno workloads
        run: dotnet workload restore src/UnoDock.slnx

      - name: Headless tests (Skia, net10.0-desktop)
        run: dotnet test src/UnoDock.Tests/UnoDock.Tests.csproj -f net10.0-desktop -c Release

      # WinUI XAML library/app build via VS MSBuild (dotnet build/msbuild trip UNOB0008).
      - name: Restore (VS MSBuild)
        run: msbuild src/UnoDock.slnx -t:restore -p:Configuration=Release -m
      - name: Build WinUI sample (VS MSBuild)
        run: >
          msbuild src/UnoDock.Sample/UnoDock.Sample.csproj -t:build
          -p:Configuration=Release
          -p:TargetFramework=net10.0-windows10.0.19041.0
          -m -verbosity:minimal -nologo

      # Best-effort: GitHub's windows-latest runs in a non-interactive session, so
      # the Uno GUI app often can't create its window and the DevFlow agent never
      # binds (macOS runners CAN host it — see the macos job, which runs live DevFlow
      # strictly). Kept non-blocking with diagnostics so a future desktop-capable
      # runner is picked up automatically; live Windows coverage is verified locally.
      - name: Live DevFlow integration (WinUI sample) — best-effort
        continue-on-error: true
        shell: pwsh
        env:
          DEVFLOW_AGENT_PORT: "9250"
          DEVFLOW_TEST_PORT: "9250"
        run: |
          $exe = "src/UnoDock.Sample/bin/Release/net10.0-windows10.0.19041.0/UnoDock.Sample.exe"
          if (-not (Test-Path $exe)) { throw "WinUI sample exe not found at $exe" }
          $out = "sample-stdout.log"; $err = "sample-stderr.log"
          $sample = Start-Process -PassThru -FilePath $exe -RedirectStandardOutput $out -RedirectStandardError $err
          try {
            $up = $false
            for ($i = 0; $i -lt 40; $i++) {
              if ($sample.HasExited) { break }
              try {
                $r = Invoke-WebRequest -UseBasicParsing -TimeoutSec 2 "http://localhost:9250/api/v1/agent/status"
                if ($r.StatusCode -eq 200) { $up = $true; break }
              } catch { Start-Sleep -Seconds 1 }
            }
            if (-not $up) {
              Write-Host "DevFlow agent did not come up. Diagnostics:"
              Write-Host "  sample HasExited=$($sample.HasExited) ExitCode=$(if ($sample.HasExited) { $sample.ExitCode } else { 'n/a' })"
              if (Test-Path $out) { Write-Host "--- stdout ---"; Get-Content $out }
              if (Test-Path $err) { Write-Host "--- stderr ---"; Get-Content $err }
              throw "DevFlow agent unavailable on the windows runner (non-interactive session)."
            }
            dotnet test src/UnoDock.Tests/UnoDock.Tests.csproj -f net10.0-desktop -c Release --filter "Category=Integration"
            if ($LASTEXITCODE -ne 0) { throw "Integration tests failed." }
          }
          finally {
            if ($sample -and -not $sample.HasExited) { Stop-Process -Id $sample.Id -Force }
          }

  macos:
    name: macOS (Skia build + headless + live DevFlow)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore Uno workloads
        run: dotnet workload restore src/UnoDock.slnx

      - name: Headless tests (Skia, net10.0-desktop)
        run: dotnet test src/UnoDock.Tests/UnoDock.Tests.csproj -f net10.0-desktop -c Release

      - name: Live DevFlow integration (Skia sample)
        env:
          DEVFLOW_AGENT_PORT: "9250"
          DEVFLOW_TEST_PORT: "9250"
        run: |
          set -e
          dotnet build src/UnoDock.Sample/UnoDock.Sample.csproj -f net10.0-desktop -c Release
          dotnet run --project src/UnoDock.Sample/UnoDock.Sample.csproj -f net10.0-desktop -c Release --no-build &
          SAMPLE_PID=$!
          cleanup() { pkill -f "UnoDock.Sample" 2>/dev/null || true; kill $SAMPLE_PID 2>/dev/null || true; }
          trap cleanup EXIT
          up=0
          for i in $(seq 1 40); do
            if curl -fsS "http://localhost:9250/api/v1/agent/status" >/dev/null 2>&1; then up=1; break; fi
            sleep 1
          done
          if [ "$up" -ne 1 ]; then echo "DevFlow agent did not come up (GUI may be unavailable on the runner)."; exit 1; fi
          dotnet test src/UnoDock.Tests/UnoDock.Tests.csproj -f net10.0-desktop -c Release --filter "Category=Integration"
