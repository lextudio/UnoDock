name: CI

# Three platform legs (docs/refactoring.md, Challenge 4): a green run means all
# three supported matrices build. Windows/Skia runs the headless NUnit suite;
# Windows/WinUI builds the Windows App SDK target via msbuild (dotnet build fails
# with UNOB0008 for XAML WinUI class libraries — see docs/winui.md); macOS/Skia
# builds + tests the Skia desktop target.
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  windows-skia:
    name: Windows / Skia (net10.0-desktop) — headless tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0   # GitVersion needs full history (no shallow clone)
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore Uno workloads
        run: dotnet workload restore src/UnoDock.slnx
      - name: Test (net10.0-desktop)
        # Integration tests skip automatically (DEVFLOW_TEST_PORT unset).
        run: dotnet test src/UnoDock.Tests/UnoDock.Tests.csproj -f net10.0-desktop -c Release

  windows-winui:
    name: Windows / WinUI (net10.0-windows10.0.19041.0) — build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0   # GitVersion needs full history (no shallow clone)
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      # Uno's UNOB0008 guard rejects the dotnet host for XAML WinUI libraries —
      # must use the Visual Studio MSBuild.exe (verified locally: dotnet msbuild
      # also fails, only VS MSBuild works). See docs/winui.md.
      - name: Add VS MSBuild to PATH
        uses: microsoft/setup-msbuild@v2
      - name: Restore Uno workloads
        run: dotnet workload restore src/UnoDock.slnx
      - name: Restore (VS MSBuild)
        run: msbuild src/UnoDock.slnx -t:restore -p:Configuration=Release -m
      - name: Build WinUI target (VS MSBuild)
        run: >
          msbuild src/UnoDock/UnoDock.csproj -t:build
          -p:Configuration=Release
          -p:TargetFramework=net10.0-windows10.0.19041.0
          -m -verbosity:minimal -nologo

  macos-skia:
    name: macOS / Skia (net10.0-desktop) — build + tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0   # GitVersion needs full history (no shallow clone)
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore Uno workloads
        run: dotnet workload restore src/UnoDock.slnx
      - name: Test (net10.0-desktop)
        run: dotnet test src/UnoDock.Tests/UnoDock.Tests.csproj -f net10.0-desktop -c Release

  windows-devflow:
    name: Windows / DevFlow integration (live sample)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore Uno workloads
        run: dotnet workload restore src/UnoDock.slnx
      - name: Build sample
        run: dotnet build src/UnoDock.Sample/UnoDock.Sample.csproj -f net10.0-desktop -c Release
      - name: Run integration tests against the live sample
        shell: pwsh
        env:
          DEVFLOW_AGENT_PORT: "9250"
          DEVFLOW_TEST_PORT: "9250"
        run: |
          # Launch the Skia desktop sample; its embedded DevFlow agent serves the
          # /api/v1 endpoints the integration tests drive.
          $sample = Start-Process -PassThru -FilePath dotnet `
            -ArgumentList "run","--project","src/UnoDock.Sample/UnoDock.Sample.csproj","-f","net10.0-desktop","-c","Release","--no-build"
          try {
            $up = $false
            for ($i = 0; $i -lt 40; $i++) {
              try {
                $r = Invoke-WebRequest -UseBasicParsing -TimeoutSec 2 "http://localhost:9250/api/v1/agent/status"
                if ($r.StatusCode -eq 200) { $up = $true; break }
              } catch { Start-Sleep -Seconds 1 }
            }
            if (-not $up) { throw "DevFlow agent did not come up on port 9250 (GUI may be unavailable on the runner)." }
            dotnet test src/UnoDock.Tests/UnoDock.Tests.csproj -f net10.0-desktop -c Release --filter "Category=Integration"
            if ($LASTEXITCODE -ne 0) { throw "Integration tests failed." }
          }
          finally {
            if ($sample -and -not $sample.HasExited) { Stop-Process -Id $sample.Id -Force }
          }

  macos-devflow:
    name: macOS / DevFlow integration (live sample)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore Uno workloads
        run: dotnet workload restore src/UnoDock.slnx
      - name: Build sample
        run: dotnet build src/UnoDock.Sample/UnoDock.Sample.csproj -f net10.0-desktop -c Release
      - name: Run integration tests against the live sample
        env:
          DEVFLOW_AGENT_PORT: "9250"
          DEVFLOW_TEST_PORT: "9250"
        run: |
          set -e
          # The DevFlow agent is renderer-agnostic; the same net10.0-desktop
          # integration tests drive it on macOS/Skia exactly as on Windows.
          dotnet run --project src/UnoDock.Sample/UnoDock.Sample.csproj -f net10.0-desktop -c Release --no-build &
          SAMPLE_PID=$!
          cleanup() { pkill -f "UnoDock.Sample" 2>/dev/null || true; kill $SAMPLE_PID 2>/dev/null || true; }
          trap cleanup EXIT
          up=0
          for i in $(seq 1 40); do
            if curl -fsS "http://localhost:9250/api/v1/agent/status" >/dev/null 2>&1; then up=1; break; fi
            sleep 1
          done
          if [ "$up" -ne 1 ]; then echo "DevFlow agent did not come up (GUI may be unavailable on the runner)."; exit 1; fi
          dotnet test src/UnoDock.Tests/UnoDock.Tests.csproj -f net10.0-desktop -c Release --filter "Category=Integration"

  winui-devflow:
    name: Windows / WinUI DevFlow integration (live sample)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Add VS MSBuild to PATH
        uses: microsoft/setup-msbuild@v2
      - name: Restore Uno workloads
        run: dotnet workload restore src/UnoDock.slnx
      - name: Restore (VS MSBuild)
        run: msbuild src/UnoDock.slnx -t:restore -p:Configuration=Release -m
      - name: Build WinUI sample (VS MSBuild)
        run: >
          msbuild src/UnoDock.Sample/UnoDock.Sample.csproj -t:build
          -p:Configuration=Release
          -p:TargetFramework=net10.0-windows10.0.19041.0
          -m -verbosity:minimal -nologo
      - name: Run integration tests against the live WinUI sample
        shell: pwsh
        env:
          DEVFLOW_AGENT_PORT: "9250"
          DEVFLOW_TEST_PORT: "9250"
        run: |
          # WinUI 3 is launched from its built exe (not dotnet run); the same
          # net10.0-desktop integration tests drive its DevFlow agent unchanged.
          $exe = "src/UnoDock.Sample/bin/Release/net10.0-windows10.0.19041.0/UnoDock.Sample.exe"
          if (-not (Test-Path $exe)) { throw "WinUI sample exe not found at $exe" }
          $sample = Start-Process -PassThru -FilePath $exe
          try {
            $up = $false
            for ($i = 0; $i -lt 40; $i++) {
              try {
                $r = Invoke-WebRequest -UseBasicParsing -TimeoutSec 2 "http://localhost:9250/api/v1/agent/status"
                if ($r.StatusCode -eq 200) { $up = $true; break }
              } catch { Start-Sleep -Seconds 1 }
            }
            if (-not $up) { throw "DevFlow agent did not come up on port 9250 (WinUI GUI may be unavailable on the runner)." }
            dotnet test src/UnoDock.Tests/UnoDock.Tests.csproj -f net10.0-desktop -c Release --filter "Category=Integration"
            if ($LASTEXITCODE -ne 0) { throw "Integration tests failed." }
          }
          finally {
            if ($sample -and -not $sample.HasExited) { Stop-Process -Id $sample.Id -Force }
          }
